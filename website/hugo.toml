baseURL = "https://ai-agent-assembly.github.io/go-sdk/"
title = "go-sdk · AI Agent Assembly"
languageCode = "en-us"
description = "Go SDK for AI Agent Assembly — runtime governance for AI agent tool calls"
enableGitInfo = true

# Fail the build on broken {{< ref >}}/{{< relref >}} targets so renamed or
# removed pages can never ship a dead internal link again.
refLinksErrorLevel = "ERROR"

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

  [[module.mounts]]
    source = "../docs"
    target = "content"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false

[params]
  # Per-page git "Last updated … by <author>" line (needs enableGitInfo + full
  # checkout history in CI). Rendered by Hextra's components/last-updated partial.
  displayUpdatedDate = true
  displayUpdatedAuthor = true
  # Pages site-root path prefix for the documentation version selector.
  # The site deploys to ai-agent-assembly.github.io/go-sdk/, so version
  # subpaths (/latest/, /v0.1.0/) must be prefixed with /go-sdk to resolve
  # correctly from any per-version baseURL. See data/versions.toml.
  versionsBasePath = "/go-sdk"
  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = "images/logo.png"
      width = 28
      height = 28
  [params.theme]
    default = "system"
    displayToggle = true
  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true
  # Built-in offline full-text search (Hextra → FlexSearch). The index is
  # generated by Hugo at build time from the docs content, so no extra build
  # step or external service is required. The navbar search box is rendered by
  # the [menu.main] item below with params.type = "search".
  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      # Index full page content (vs. summary/heading/title) for best recall.
      index = "content"

[menu]
  # Search box — rendered in the navbar by Hextra when a menu item declares
  # params.type = "search". weight 0 places it ahead of the page links.
  [[menu.main]]
    identifier = "search"
    name = "Search"
    weight = 0
    [menu.main.params]
      type = "search"
  [[menu.main]]
    identifier = "docs"
    name = "Docs"
    pageRef = "/"
    weight = 1
  [[menu.main]]
    identifier = "godoc"
    name = "API Reference"
    pageRef = "/api-reference"
    weight = 2
  [[menu.main]]
    identifier = "github"
    name = "GitHub"
    url = "https://github.com/ai-agent-assembly/go-sdk"
    weight = 3

  # SDK switcher — cross-links to the shared docs hub and sibling SDK sites.
  [[menu.main]]
    identifier = "sdk-docs-hub"
    name = "Docs Hub"
    url = "https://ai-agent-assembly.github.io/agent-assembly-docs/"
    weight = 10
    [menu.main.params]
      group = "SDKs"
  [[menu.main]]
    identifier = "sdk-python"
    name = "Python SDK"
    url = "https://ai-agent-assembly.github.io/python-sdk/"
    weight = 11
    [menu.main.params]
      group = "SDKs"
  [[menu.main]]
    identifier = "sdk-node"
    name = "Node SDK"
    url = "https://ai-agent-assembly.github.io/node-sdk/"
    weight = 12
    [menu.main.params]
      group = "SDKs"
  [[menu.main]]
    identifier = "sdk-go"
    name = "Go SDK"
    url = "https://ai-agent-assembly.github.io/go-sdk/"
    weight = 13
    [menu.main.params]
      group = "SDKs"

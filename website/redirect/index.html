<!DOCTYPE html>
<!--
  GitHub Pages site-root redirect for versioned documentation (AAASM-2754).

  Documentation is published under per-channel / per-version subpaths
  (/latest/, /pre-release/, /stable/, /<tag>/). This file is placed at the
  Pages site root by the Docs Site workflow so visitors landing on the bare
  site URL are forwarded to the preferred channel.

  Landing precedence: stable -> pre-release -> latest.
  The workflow rewrites the @@DEFAULT_PATH@@ token below to the resolved
  channel subpath (e.g. ./stable/) by reading data/versions.toml, so the root
  always lands on the best available channel without a hardcoded version.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!--
    No-JS fallback only (AAASM-3559). For JS-enabled browsers the redirect is
    deferred via setTimeout in <body> so gtag.js can load and send its
    page_view hit before the page navigates away; an instant meta-refresh here
    would navigate before the GA hit fires (Google's tag test then reports the
    tag as not detected). Browsers without JS still redirect immediately.
  -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=@@DEFAULT_PATH@@" />
  </noscript>
  <link rel="canonical" href="@@DEFAULT_PATH@@" />
  <title>Redirecting to documentation…</title>
  <!--
    Google Analytics 4 with Consent Mode v2 (AAASM-3559).

    This bare-root stub is a static redirect (not Hugo-rendered), so it never
    runs layouts/_partials/custom/head-end.html and would otherwise carry no GA
    tag — Google's "Test your website" on the bare root then reports the tag as
    not detected. Mirror the content pages' gated GA snippet here, with the same
    deny-by-default consent posture, so the root is tagged before it redirects.
    Measurement ID G-WMTJDD3JZ6 matches params.analytics.googleAnalyticsID in
    website/hugo.toml.
  -->
  <script>
    // 1. Consent Mode default: deny everything before any GA hit can fire.
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('consent', 'default', {
      'analytics_storage': 'denied',
      'ad_storage': 'denied',
      'ad_user_data': 'denied',
      'ad_personalization': 'denied',
      'wait_for_update': 500
    });
    // 2. Re-apply a previously stored opt-in BEFORE the first hit.
    try {
      if (window.localStorage &&
          localStorage.getItem('aa-analytics-consent') === 'granted') {
        gtag('consent', 'update', { 'analytics_storage': 'granted' });
      }
    } catch (e) { /* localStorage unavailable (private mode); stay denied */ }
    gtag('js', new Date());
    // 4. Configure GA4 (hits respect the consent state set above).
    gtag('config', 'G-WMTJDD3JZ6', { 'anonymize_ip': true });
  </script>
  <!-- 3. Load gtag.js (after consent default is established). -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WMTJDD3JZ6"></script>
</head>
<body>
  <p>Redirecting to the <a href="@@DEFAULT_PATH@@">documentation</a>…</p>
  <!--
    Defer the redirect ~1.5s so gtag.js (loaded async in <head>) has time to
    initialise and send its page_view hit before navigation (AAASM-3559).
  -->
  <script>
    setTimeout(function () {
      window.location.replace("@@DEFAULT_PATH@@" + window.location.hash);
    }, 1500);
  </script>
</body>
</html>

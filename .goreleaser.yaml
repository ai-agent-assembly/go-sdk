version: 2

project_name: go-sdk

# go-sdk is a Go library module — there is no main binary to ship. Releases carry
# auto-generated notes, a source archive, and checksums (no platform binaries).
builds:
  - skip: true

source:
  enabled: true

release:
  # Infer the GitHub Release's pre-release flag from the tag's SemVer suffix:
  # tags like v0.0.1-rc.2 / -beta.N / -alpha.N are marked prerelease=true,
  # while a plain GA tag (v0.0.1) stays a full release. Without this, every
  # release defaulted to prerelease=false (AAASM-3838).
  prerelease: auto

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

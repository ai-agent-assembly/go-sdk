sonar.host.url=https://sonarcloud.io
sonar.projectKey=ai-agent-assembly_go-sdk
sonar.organization=ai-agent-assembly

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=go-sdk
sonar.projectVersion=0.0.0

# Path is relative to the sonar-project.properties file.
sonar.projectBaseDir=./
sonar.sources=assembly/,internal/
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Generated protobuf stubs are emitted by `protoc` and never hand-edited
# (regenerated via `make proto`). Exclude them from analysis so their machine
# generated code-smells (empty functions, duplicated literals, etc.) stop
# counting against the project.
sonar.exclusions=**/internal/proto/**/*.pb.go,**/internal/proto/*.pb.go

# Coverage exclusions for source the measured (non-native) coverage build can
# never execute, so their lines must not count against the coverage denominator:
#   - cgo_bridge.go is gated `//go:build cgo && aa_ffi_go` — the thin C-ABI shim
#     is only compiled with `-tags aa_ffi_go`. Its residual uncovered lines are
#     native error branches that need a misbehaving C library to reach and are
#     not meaningfully unit-testable from Go.
#   - gateway_resolver_windows.go is gated `//go:build windows` — it never
#     compiles on the ubuntu coverage runner.
# Every other build-tag-gated / platform file (gateway_resolver_unix.go and the
# `!cgo || !aa_ffi_go` fallback bindings) IS reachable in the measured build and
# is covered by tests instead of excluded.
# NOTE: coverage.yml passes sonar.coverage.exclusions on the scanner command
# line, which overrides this property — keep the two lists in sync.
sonar.coverage.exclusions=examples/**,**/cgo_bridge.go,**/gateway_resolver_windows.go

# Encoding of the source code. Default is default system encoding.
sonar.sourceEncoding=UTF-8

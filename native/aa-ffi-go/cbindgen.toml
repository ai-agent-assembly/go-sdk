# cbindgen config for aa-ffi-go's C ABI header.
#
# Regenerate the committed header after any change to the C ABI in src/lib.rs:
#
#   cd native/aa-ffi-go && cbindgen --config cbindgen.toml --crate aa-ffi-go \
#       --output include/aa_ffi_go.h
#
# (or run `./regen-header.sh` from this crate directory).
language = "C"
include_guard = "AA_FFI_GO_H"
cpp_compat = true
documentation = true
documentation_style = "c"
style = "type"
header = "/* Generated by cbindgen — do not edit by hand. See aa-ffi-go/cbindgen.toml. */"

[parse]
# Don't descend into aa-sdk-client; the handle is opaque to C on purpose.
parse_deps = false

[export]
# Force-emit the status typedef and the opaque handle (the handle wraps a
# foreign, non-repr(C) type, so cbindgen emits it as an opaque forward decl).
include = ["AaStatus", "aa_client_handle"]

name: Coverage

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cgo-enabled: ["0", "1"]
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CGO_ENABLED: ${{ matrix.cgo-enabled }}
      COVERAGE_FILE: coverage-${{ matrix.cgo-enabled }}.out

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.x"

      - name: Resolve modules
        run: go mod tidy

      - name: Run tests with coverage
        run: go test ./... -covermode=atomic -coverprofile=$COVERAGE_FILE

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ env.CODECOV_TOKEN }}
          slug: AI-agent-assembly/go-sdk
          files: ${{ env.COVERAGE_FILE }}
          flags: unit,go-sdk,cgo-${{ matrix.cgo-enabled }}
          name: go-sdk-coverage-cgo-${{ matrix.cgo-enabled }}
          verbose: true
          fail_ci_if_error: true

      - name: Skip Codecov upload when token is missing
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "CODECOV_TOKEN is not configured; skipping upload."

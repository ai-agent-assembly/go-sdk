name: Coverage

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cgo-enabled: ["0", "1"]
    permissions:
      contents: read
      pull-requests: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CGO_ENABLED: ${{ matrix.cgo-enabled }}
      COVERAGE_FILE: coverage-${{ matrix.cgo-enabled }}.out
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'ai-agent-assembly_go-sdk' }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || 'ai-agent-assembly' }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          # AAASM-3816: fetch full history + tags so the Sonar step can derive
          # sonar.projectVersion from the latest release tag (git describe). The
          # default shallow checkout fetches no tags, leaving the version stuck.
          fetch-depth: 0

      # AAASM-3445: the cgo=1 leg also builds the vendored native/aa-ffi-go shim
      # and runs a -tags aa_ffi_go coverage pass so the cgo bridge lines are
      # compiled + exercised; that requires a Rust toolchain + protoc.
      - name: Setup Rust
        if: ${{ matrix.cgo-enabled == '1' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        if: ${{ matrix.cgo-enabled == '1' }}
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Run tests with coverage
        run: go test ./... -covermode=atomic -coverprofile=$COVERAGE_FILE

      # AAASM-3445: the cgo bridge (internal/ffi/cgo_bridge.go) is gated behind
      # `cgo && aa_ffi_go` and only compiled with -tags aa_ffi_go after the native
      # shim is built. The default pass above never sets that tag, so the bridge
      # lines were always reported uncovered to SonarCloud, failing the new-code
      # coverage gate on every cgo-touching PR (AAASM-3048/3404/3444). Build the
      # native lib, run a tagged coverage pass, and merge it into the profile fed
      # to Sonar so those lines count as covered.
      - name: Run cgo-tagged tests with coverage and merge
        if: ${{ matrix.cgo-enabled == '1' }}
        run: |
          make native
          CGO_ENABLED=1 go test -tags aa_ffi_go ./... \
            -covermode=atomic -coverpkg=./... \
            -coverprofile=coverage.aacgo.out
          go run github.com/wadey/gocovmerge@latest \
            "$COVERAGE_FILE" coverage.aacgo.out > coverage.merged.out
          echo "SONAR_COVERAGE_FILE=coverage.merged.out" >> "${GITHUB_ENV}"

      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ env.CODECOV_TOKEN }}
          slug: ai-agent-assembly/go-sdk
          files: ${{ env.COVERAGE_FILE }}
          flags: unit,go-sdk,cgo-${{ matrix.cgo-enabled }}
          name: go-sdk-coverage-cgo-${{ matrix.cgo-enabled }}
          verbose: true
          # Codecov upload is an informational report, not a correctness gate; do not
          # let codecov-action infra flakes (e.g. CLI GPG-signature verification) fail CI.
          fail_ci_if_error: false

      - name: Skip Codecov upload when token is missing
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "CODECOV_TOKEN is not configured; skipping upload."

      # AAASM-2666: run the SonarQube scan here in the cgo=1 coverage leg,
      # reusing the coverage profile already produced above. This removes the
      # duplicate `go test` that the standalone sonarqube.yml used to run.
      - name: Build Sonar scanner arguments
        if: ${{ matrix.cgo-enabled == '1' && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        run: |
          scanner_args="-Dsonar.projectKey=${SONAR_PROJECT_KEY} -Dsonar.go.coverage.reportPaths=${SONAR_COVERAGE_FILE:-$COVERAGE_FILE} -Dsonar.test.inclusions=**/*_test.go -Dsonar.coverage.exclusions=examples/**,**/cgo_bridge.go,**/gateway_resolver_windows.go"
          if [ -n "${SONAR_ORGANIZATION}" ]; then
            scanner_args="${scanner_args} -Dsonar.organization=${SONAR_ORGANIZATION}"
          fi
          # AAASM-3816: derive sonar.projectVersion from the latest release tag so
          # the SonarCloud leak-period gate tracks the shipped version instead of
          # the static 0.0.0 that left it "Not computed". go-sdk is tag-versioned:
          # strip only the leading "v" and keep the full version including any
          # pre-release suffix (v0.0.1-rc.1 -> 0.0.1-rc.1) so the gate tracks the
          # real shipped version. Falls back to the literal in
          # sonar-project.properties when no tag is reachable.
          version="$(git describe --tags --abbrev=0 2>/dev/null | sed -E 's/^v//')"
          if [ -n "${version}" ]; then
            scanner_args="${scanner_args} -Dsonar.projectVersion=${version}"
          fi
          echo "SONAR_SCANNER_ARGS=${scanner_args}" >> "${GITHUB_ENV}"

      - name: Run SonarQube scan
        if: ${{ matrix.cgo-enabled == '1' && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: ${{ env.SONAR_SCANNER_ARGS }}

      # Advisory: a failed quality gate (coverage/issues) is an acceptance
      # signal, not a build error — it reports to SonarCloud but must not redden
      # CI (mirrors the agent-assembly model where sonar is excluded from the gate).
      - name: Check SonarQube quality gate (advisory)
        if: ${{ matrix.cgo-enabled == '1' && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        continue-on-error: true
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
          pollingTimeoutSec: 300

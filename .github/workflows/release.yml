name: Release

# Tag-triggered release pipeline for the Go SDK (AAASM-3568).
#
# Go modules are source-distributed via the module proxy + checksum DB, so
# there is no binary to build or sign here (`.goreleaser.yaml` keeps
# `builds: skip: true`). What a consumer cannot get from the proxy is a
# machine-readable dependency manifest, so on every `v*` tag we generate a
# CycloneDX SBOM for the module and attach it to the GitHub Release.
on:
  push:
    tags:
      - "v*"
  # Lets an operator re-run the SBOM attach for an already-pushed tag
  # (e.g. after a partial failure) without re-cutting the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)generate + attach the SBOM for."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sbom:
    name: Generate + attach CycloneDX SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the SBOM asset to the GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          # On workflow_dispatch the default ref is the branch, not the tag —
          # check out the operator-supplied tag so the SBOM matches it.
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Install cyclonedx-gomod
        # Pinned minor; bump deliberately. Generates the CycloneDX SBOM for
        # the Go module dependency graph.
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.9.0

      - name: Generate CycloneDX SBOM
        run: cyclonedx-gomod mod -json -output sbom.cdx.json

      - name: Attach SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # github.ref_name is the tag on a tag push; fall back to the
          # operator-supplied tag on workflow_dispatch.
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release upload "$RELEASE_TAG" sbom.cdx.json --clobber

name: Release

# Tag-triggered release pipeline for the Go SDK (AAASM-3568).
#
# Go modules are source-distributed via the module proxy + checksum DB, so
# there is no binary to build or sign here (`.goreleaser.yaml` keeps
# `builds: skip: true`). What a consumer cannot get from the proxy is a
# machine-readable dependency manifest, so on every `v*` tag we generate a
# CycloneDX SBOM for the module and attach it to the GitHub Release.
on:
  push:
    tags:
      - "v*"
  # Lets an operator re-run the SBOM attach for an already-pushed tag
  # (e.g. after a partial failure) without re-cutting the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to (re)generate + attach the SBOM for."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # AAASM-3626: bind the advisory + checksum gate to the release moment.
  # govulncheck.yml already runs this on PR/push/schedule, but not on a v*
  # tag — so a regression between the last master push and the tag could
  # otherwise ship. The "Verify modules" + "Run govulncheck" steps below are
  # copied VERBATIM from govulncheck.yml (incl. the RC==3 / KNOWN_UNFIXED
  # allowlist) so the accepted-risk list stays in lockstep; update both
  # together. The sbom job `needs` this, so a known-vuln dependency blocks
  # the SBOM attach and thus the release.
  #
  # AAASM-4519: the allowlist here MUST match govulncheck.yml exactly — the two
  # already drifted once (release.yml still had only GO-2026-4971 after
  # govulncheck.yml added GO-2026-5856), which failed the rc.4 release gate and
  # skipped the SBOM. It is deliberately kept inline rather than factored into a
  # shared committed file: this gate checks out `ref: inputs.tag` (the target
  # tag's tree), and a tag cut before the file existed — e.g. rc.4 — would not
  # contain it, breaking the very re-run this workflow_dispatch exists for.
  # When editing the KNOWN_UNFIXED block below, edit govulncheck.yml identically.
  security-gate:
    name: Govulncheck + go mod verify (release gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.x"

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Run govulncheck
        # AAASM-4634: force the scan onto go1.26.5. CI inherits
        # GOTOOLCHAIN=local, which makes `go` ignore the `toolchain go1.26.5`
        # directive in go.mod and run under whatever setup-go resolved
        # (`go-version: 1.26.x` → the 1.26.4 toolcache). An *explicit* version
        # here overrides `local`: `go` self-downloads and runs exactly go1.26.5,
        # where GO-2026-5856 (crypto/tls ECH privacy leak) is patched — so the
        # scan sees it as fixed instead of flagging it against the older
        # resolved toolchain.
        env:
          GOTOOLCHAIN: go1.26.5
        run: |
          set +e
          go tool govulncheck ./... 2>&1 | tee /tmp/govulncheck.txt
          RC=${PIPESTATUS[0]}
          if [ "$RC" -eq 3 ]; then
            # Extract IDs of vulnerabilities that directly affect our code
            ALL_IDS=$(grep -E "^Vulnerability #[0-9]+: GO-" /tmp/govulncheck.txt | grep -oE "GO-[0-9]+-[0-9]+")
            # CVEs whose fix is not yet available in the pinned Go toolchain
            # line. Each entry MUST cite the fixed-in version and the follow-up
            # bump ticket. Empty as of AAASM-4709: GO-2026-4971 (previously
            # listed here as "awaiting go1.26.3, no released fix") was fixed in
            # go1.26.3, and this step runs under GOTOOLCHAIN=go1.26.5 (see the
            # step env above) — i.e. already past that fix — so the entry was
            # dead. GO-2026-5856 (crypto/tls ECH privacy leak, fixed in
            # go1.26.5) likewise resolves as fixed under this toolchain and
            # needs no entry (AAASM-4634).
            KNOWN_UNFIXED=""
            UNKNOWN=$(echo "$ALL_IDS" | grep -vxF "$KNOWN_UNFIXED" | tr -d '[:space:]')
            if [ -z "$UNKNOWN" ]; then
              echo "::warning::Known unfixed CVE(s) with no released fix in the pinned toolchain: $ALL_IDS. Treating as accepted risk."
              exit 0
            fi
          fi
          exit "$RC"

  sbom:
    name: Generate + attach CycloneDX SBOM
    needs: security-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write # upload the SBOM asset to the GitHub Release
    env:
      # AAASM-4709: pin this job onto the go1.26.5 toolchain, the same one the
      # security-gate job above already forces (see the AAASM-4634 comment on
      # its "Run govulncheck" step). Without this, `go` resolves to whatever
      # actions/setup-go's `go-version: "1.26.x"` cached (the 1.26.4 toolcache)
      # and `go install`/cyclonedx-gomod's module resolution run outbound TLS
      # on a stdlib still vulnerable to GO-2026-5856.
      GOTOOLCHAIN: go1.26.5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive
          # On workflow_dispatch the default ref is the branch, not the tag —
          # check out the operator-supplied tag so the SBOM matches it.
          ref: ${{ inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.x"

      - name: Install cyclonedx-gomod
        # AAASM-4022: pin to the immutable commit SHA behind the v1.9.0 tag
        # (a tag can be re-pointed; a SHA cannot) so the SBOM tool is
        # supply-chain reproducible. SHA = tag v1.9.0; bump deliberately.
        # Generates the CycloneDX SBOM for the Go module dependency graph.
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@89865b67004ac1333b5ecfa085ef49e6684c473c

      - name: Generate CycloneDX SBOM
        run: cyclonedx-gomod mod -json -output sbom.cdx.json

      - name: Attach SBOM to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # github.ref_name is the tag on a tag push; fall back to the
          # operator-supplied tag on workflow_dispatch.
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: gh release upload "$RELEASE_TAG" sbom.cdx.json --clobber

name: Docs Site

on:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths:
      - "website/**"
      - "docs/**"
      - ".github/workflows/docs-site.yml"
  pull_request:
    branches:
      - master
    paths:
      - "website/**"
      - "docs/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.161.1"
  # Pages site-root path prefix. Used to build per-version baseURLs and the
  # root redirect target. Must match params.versionsBasePath in website/hugo.toml.
  PAGES_BASE: "https://ai-agent-assembly.github.io/go-sdk"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.24"

      - name: Install Hugo extended
        run: |
          wget --https-only -O "$RUNNER_TEMP/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "$RUNNER_TEMP/hugo.deb"

      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        id: pages
        uses: actions/configure-pages@v6

      - name: Resolve Hugo modules
        working-directory: website
        run: hugo mod tidy

      # Determine which documentation version + channel this run publishes.
      #   * push to master      -> channel "latest" (live docs tracking master)
      #   * push of a v* tag     -> channel detected from the tag:
      #         ^v\d+\.\d+\.\d+$    -> "stable"      (e.g. v0.1.0)
      #         ^v\d+\.\d+\.\d+-.+  -> "pre-release" (e.g. v0.0.1-alpha.5)
      #     The tag is built into its concrete /<tag>/ subpath and the moving
      #     channel alias (/stable/ or /pre-release/) is pointed at it.
      #   * PRs / dispatch       -> channel "latest" (preview build only)
      - name: Resolve docs version
        id: version
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            if printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              CHANNEL="stable"
            elif printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              CHANNEL="pre-release"
            else
              echo "::error::Tag '$REF_NAME' is not a recognised release tag (vX.Y.Z or vX.Y.Z-...)."
              exit 1
            fi
            {
              echo "version=${REF_NAME}"
              echo "channel=${CHANNEL}"
              echo "frozen=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "version=latest"
              echo "channel=latest"
              echo "frozen=false"
            } >> "$GITHUB_OUTPUT"
          fi

      # On a release tag, register the frozen archived snapshot for the tag and
      # RECOMPUTE the moving channel entries (stable / pre-release) from the FULL
      # set of known tags. Channels are never appended incrementally: every run
      # rebuilds them from scratch so a superseding stable correctly drops a
      # pre-release that is now behind it (the pre-release stays reachable as an
      # archived entry). The latest (master) entry is left untouched. The gate
      # itself lives in website/scripts/versions_channels.py and is unit-tested.
      - name: Register frozen version + recompute channel aliases
        if: steps.version.outputs.frozen == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          FILE="website/data/versions.toml"
          python3 - "$FILE" "$VERSION" <<'PY'
          import os, re, sys

          sys.path.insert(0, os.path.join("website", "scripts"))
          from versions_channels import compute_channels  # noqa: E402

          path, version = sys.argv[1], sys.argv[2]
          with open(path, encoding="utf-8") as fh:
              text = fh.read()

          # Parse existing entries into (channel, field-dict) records.
          blocks = re.split(r'(?m)^\[\[versions\]\]\s*$', text)
          head = blocks[0]
          records = []
          for body in blocks[1:]:
              fields = dict(re.findall(r'(\w+)\s*=\s*"([^"]+)"', body))
              flags = dict(re.findall(r'(\w+)\s*=\s*(true|false)\b', body))
              fields.update({k: v for k, v in flags.items()})
              records.append(fields)

          # The full known tag set = the tag being pushed + every archived tag +
          # every tag a moving channel currently points at. This is what the
          # channel gate recomputes from.
          tags = {version}
          for r in records:
              if r.get("channel") == "archived" and r.get("version"):
                  tags.add(r["version"])
              if r.get("channel") in ("stable", "pre-release") and r.get("tag"):
                  tags.add(r["tag"])

          # Keep only non-channel entries (latest + archived); channels are
          # regenerated below. Re-emit latest first, then archived.
          latest = [r for r in records if r.get("channel") == "latest"]
          archived = [r for r in records if r.get("channel") == "archived"]

          # Ensure the pushed tag has an archived entry (idempotent).
          if not any(r.get("version") == version for r in archived):
              archived.append({
                  "channel": "archived",
                  "version": version,
                  "label": version,
                  "path": f"/{version}/",
              })

          channels = compute_channels(sorted(tags))

          def emit(r):
              order = ["channel", "version", "label", "path", "tag", "default"]
              keys = order + [k for k in r if k not in order]
              lines = ["[[versions]]"]
              for k in keys:
                  if k not in r:
                      continue
                  v = r[k]
                  if v in ("true", "false"):
                      lines.append(f"  {k} = {v}")
                  else:
                      lines.append(f'  {k} = "{v}"')
              return "\n".join(lines)

          out = head.rstrip("\n") + "\n"
          out_records = list(latest)
          for channel in ("stable", "pre-release"):
              tag = channels.get(channel)
              if tag:
                  out_records.append({
                      "channel": channel,
                      "version": channel,
                      "label": f"{channel} ({tag})",
                      "path": f"/{channel}/",
                      "tag": tag,
                  })
          out_records.extend(archived)
          out += "\n" + "\n\n".join(emit(r) for r in out_records) + "\n"

          with open(path, "w", encoding="utf-8") as fh:
              fh.write(out)
          print(f"Recomputed channels {channels} from tags {sorted(tags)}.")
          print(open(path, encoding="utf-8").read())
          PY

      - name: Build site
        working-directory: website
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANNEL="${{ steps.version.outputs.channel }}"
          # Build the version under publication into its own subpath. On a tag
          # this is the concrete /<tag>/; on master it is /latest/.
          hugo --gc --minify \
            --baseURL "${PAGES_BASE}/${VERSION}/" \
            --destination "public/${VERSION}"
          # On a release tag, also build the moving channel alias subpath
          # (/stable/ or /pre-release/) pointing at the same content, so
          # .../go-sdk/<channel>/ resolves to this concrete build. Only build the
          # alias when the recompute step actually emitted that channel pointing
          # at THIS tag: a pre-release tag that is behind the newest stable is
          # gated out (no pre-release entry), so its /pre-release/ alias must not
          # be built. The selector data lists only emitted aliases.
          ALIAS_TAG=$(python3 - data/versions.toml "$CHANNEL" <<'PY'
          import re, sys
          with open(sys.argv[1], encoding="utf-8") as fh:
              text = fh.read()
          channel = sys.argv[2]
          for body in re.split(r'(?m)^\[\[versions\]\]\s*$', text)[1:]:
              ch = re.search(r'channel\s*=\s*"([^"]+)"', body)
              tag = re.search(r'tag\s*=\s*"([^"]+)"', body)
              if ch and ch.group(1) == channel and tag:
                  print(tag.group(1))
                  break
          PY
          )
          if [ "${{ steps.version.outputs.frozen }}" = "true" ] && [ "$VERSION" != "$CHANNEL" ] && [ "$ALIAS_TAG" = "$VERSION" ]; then
            hugo --gc --minify \
              --baseURL "${PAGES_BASE}/${CHANNEL}/" \
              --destination "public/${CHANNEL}"
          else
            echo "Channel '$CHANNEL' not emitted for $VERSION (gated or superseded); skipping alias build."
          fi

      # Assemble the Pages artifact. Existing version subpaths must NOT be
      # wiped: a single deploy-pages artifact replaces the whole site, so a
      # release that cuts a new frozen snapshot must also re-include the
      # previously-published versions.
      #
      # NOTE (release-time aggregation): this job builds the version under
      # publication ("latest" on master, or the tagged snapshot + its channel
      # alias on a tag). Master pushes republish "latest" each time. Cutting the
      # first frozen vX.Y.Z snapshot additionally requires re-materialising the
      # other channels/versions in the same artifact (rebuild from master or
      # fetch the deployed site). That cross-version aggregation is the release
      # step and is intentionally left for the release window.

      # The site-root redirect lands on the best channel: stable, else
      # pre-release, else latest. Resolve the target from versions.toml and
      # substitute it into the redirect template so the root is never hardcoded.
      - name: Add site-root redirect through stable -> pre-release -> latest
        if: github.event_name == 'push'
        run: |
          DEFAULT_PATH=$(python3 - website/data/versions.toml <<'PY'
          import sys, re
          with open(sys.argv[1], encoding="utf-8") as fh:
              text = fh.read()
          paths = {}
          for body in re.split(r'(?m)^\[\[versions\]\]\s*$', text)[1:]:
              ch = re.search(r'channel\s*=\s*"([^"]+)"', body)
              pa = re.search(r'path\s*=\s*"([^"]+)"', body)
              if ch and pa:
                  paths[ch.group(1)] = pa.group(1)
          for channel in ("stable", "pre-release", "latest"):
              if channel in paths:
                  print("." + paths[channel])
                  break
          else:
              print("./latest/")
          PY
          )
          echo "Root redirect target: ${DEFAULT_PATH}"
          mkdir -p website/public
          sed "s#@@DEFAULT_PATH@@#${DEFAULT_PATH}#g" \
            website/redirect/index.html > website/public/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/public

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

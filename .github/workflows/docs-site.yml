name: Docs Site

on:
  push:
    branches:
      - master
    tags:
      - "v*"
    paths:
      - "website/**"
      - "docs/**"
      - ".github/workflows/docs-site.yml"
  pull_request:
    branches:
      - master
    paths:
      - "website/**"
      - "docs/**"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.161.1"
  # Pages site-root path prefix. Used to build per-version baseURLs and the
  # root redirect target. Must match params.versionsBasePath in website/hugo.toml.
  PAGES_BASE: "https://ai-agent-assembly.github.io/go-sdk"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.24"

      - name: Install Hugo extended
        run: |
          # githubactions:S6506 — a redirect IS required here: GitHub release
          # download URLs (github.com/.../releases/download/...) 302 to the asset
          # CDN (objects.githubusercontent.com). Rather than follow redirects
          # unbounded, cap the chain to the single expected hop with
          # --max-redirect=1, and --https-only keeps every hop on TLS so an
          # injected Location header can't downgrade to plaintext.
          wget --https-only --max-redirect=1 -O "$RUNNER_TEMP/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "$RUNNER_TEMP/hugo.deb"

      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        id: pages
        uses: actions/configure-pages@v6

      # Determine which documentation version + channel this run publishes.
      #   * push to master      -> channel "latest" (live docs tracking master)
      #   * push of a v* tag     -> channel detected from the tag:
      #         ^v\d+\.\d+\.\d+$    -> "stable"      (e.g. v0.1.0)
      #         ^v\d+\.\d+\.\d+-.+  -> "pre-release" (e.g. v0.0.1-alpha.5)
      #     The tag is built into its concrete /<tag>/ subpath and the moving
      #     channel alias (/stable/ or /pre-release/) is pointed at it.
      #   * PRs / dispatch       -> channel "latest" (preview build only)
      - name: Resolve docs version
        id: version
        run: |
          REF_NAME="${{ github.ref_name }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            if printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
              CHANNEL="stable"
            elif printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              CHANNEL="pre-release"
            else
              echo "::error::Tag '$REF_NAME' is not a recognised release tag (vX.Y.Z or vX.Y.Z-...)."
              exit 1
            fi
            {
              echo "version=${REF_NAME}"
              echo "channel=${CHANNEL}"
              echo "frozen=true"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "version=latest"
              echo "channel=latest"
              echo "frozen=false"
            } >> "$GITHUB_OUTPUT"
          fi

      # Recompute versions.toml on every run (master push, tag push, PR, manual).
      # The full known tag set is discovered from `git tag -l` so versions.toml on
      # master no longer drifts behind the deployed site (AAASM-2830). Channels
      # are never appended incrementally: the moving stable / pre-release entries
      # are regenerated from scratch using versions_channels.compute_channels so a
      # superseding stable correctly drops a pre-release that is now behind it
      # (the pre-release stays reachable as an archived entry). The latest
      # (master) entry is preserved from the checked-in file.
      - name: Recompute versions.toml from git tags
        run: |
          FILE="website/data/versions.toml"
          mapfile -t TAGS < <(git tag -l 'v*')
          # Add the tag being pushed too, in case `git tag -l` is somehow behind
          # the ref that triggered this run.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAGS+=("${{ github.ref_name }}")
          fi
          printf 'Discovered tags:\n'
          printf '  %s\n' "${TAGS[@]}"
          python3 - "$FILE" "${TAGS[@]}" <<'PY'
          import os, re, sys

          sys.path.insert(0, os.path.join("website", "scripts"))
          from versions_channels import compute_channels, parse_tag  # noqa: E402

          path = sys.argv[1]
          raw_tags = sys.argv[2:]

          with open(path, encoding="utf-8") as fh:
              text = fh.read()

          # Parse existing entries so we can preserve any hand-curated "latest"
          # metadata (label, default flag) the engineer set in the checked-in file.
          blocks = re.split(r'(?m)^\[\[versions\]\]\s*$', text)
          head = blocks[0]
          existing = []
          for body in blocks[1:]:
              fields = dict(re.findall(r'(\w+)\s*=\s*"([^"]+)"', body))
              flags = dict(re.findall(r'(\w+)\s*=\s*(true|false)\b', body))
              fields.update({k: v for k, v in flags.items()})
              existing.append(fields)

          # Keep the latest (master) entry as-is. If the user removed it, fall
          # back to a sensible default so the moving "latest" channel always
          # renders.
          latest = [r for r in existing if r.get("channel") == "latest"]
          if not latest:
              latest = [{
                  "channel": "latest",
                  "version": "latest",
                  "label": "latest (master)",
                  "path": "/latest/",
                  "default": "true",
              }]

          # De-duplicate, keep only well-formed semver tags. Drop any raw_tags
          # entries that don't parse so a stray junk ref can't break the deploy.
          tag_set = {t for t in raw_tags if t and parse_tag(t) is not None}
          channels = compute_channels(sorted(tag_set))

          # Archived = one entry per concrete release tag, kept reachable.
          archived = []
          for tag in sorted(tag_set, key=lambda t: parse_tag(t).raw if parse_tag(t) else t):
              archived.append({
                  "channel": "archived",
                  "version": tag,
                  "label": tag,
                  "path": f"/{tag}/",
              })

          def emit(r):
              order = ["channel", "version", "label", "path", "tag", "default"]
              keys = order + [k for k in r if k not in order]
              lines = ["[[versions]]"]
              for k in keys:
                  if k not in r:
                      continue
                  v = r[k]
                  if v in ("true", "false"):
                      lines.append(f"  {k} = {v}")
                  else:
                      lines.append(f'  {k} = "{v}"')
              return "\n".join(lines)

          out_records = list(latest)
          for channel in ("stable", "pre-release"):
              tag = channels.get(channel)
              if tag:
                  out_records.append({
                      "channel": channel,
                      "version": channel,
                      "label": f"{channel} ({tag})",
                      "path": f"/{channel}/",
                      "tag": tag,
                  })
          out_records.extend(archived)

          out = head.rstrip("\n") + "\n"
          out += "\n" + "\n\n".join(emit(r) for r in out_records) + "\n"

          with open(path, "w", encoding="utf-8") as fh:
              fh.write(out)
          print(f"Recomputed channels {channels} from {len(tag_set)} tag(s).")
          print(open(path, encoding="utf-8").read())
          PY

      # Build EVERY subpath listed in versions.toml into the Pages artifact tree
      # (AAASM-2830). The Pages deploy artifact is a full-site replacement, so a
      # release that cuts a new frozen snapshot must also re-include the
      # previously-published versions — otherwise the new artifact silently wipes
      # them. The script walks the recomputed versions.toml and, for each entry,
      # checks out the corresponding git ref into a temporary worktree, overlays
      # the recomputed versions.toml so historical snapshots show the current
      # selector dropdown, and runs Hugo into website/public/<subpath>/.
      - name: Build every versions.toml subpath
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
          PAGES_BASE: ${{ env.PAGES_BASE }}
          PUBLIC_DIR: ${{ github.workspace }}/website/public
          REPO_ROOT: ${{ github.workspace }}
        run: |
          mkdir -p "$PUBLIC_DIR"
          bash website/scripts/build_all_versions.sh

      # The site-root redirect lands on the best channel: stable, else
      # pre-release, else latest. Resolve the target from versions.toml and
      # substitute it into the redirect template so the root is never hardcoded.
      - name: Add site-root redirect through stable -> pre-release -> latest
        if: github.event_name == 'push'
        run: |
          DEFAULT_PATH=$(python3 - website/data/versions.toml <<'PY'
          import sys, re
          with open(sys.argv[1], encoding="utf-8") as fh:
              text = fh.read()
          paths = {}
          for body in re.split(r'(?m)^\[\[versions\]\]\s*$', text)[1:]:
              ch = re.search(r'channel\s*=\s*"([^"]+)"', body)
              pa = re.search(r'path\s*=\s*"([^"]+)"', body)
              if ch and pa:
                  paths[ch.group(1)] = pa.group(1)
          for channel in ("stable", "pre-release", "latest"):
              if channel in paths:
                  print("." + paths[channel])
                  break
          else:
              print("./latest/")
          PY
          )
          echo "Root redirect target: ${DEFAULT_PATH}"
          mkdir -p website/public
          sed "s#@@DEFAULT_PATH@@#${DEFAULT_PATH}#g" \
            website/redirect/index.html > website/public/index.html

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/public

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

name: Lint

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# AAASM-3993: least-privilege default token — this workflow only checks out and
# runs tests/builds; no job pushes, comments, or deploys.
permissions:
  contents: read

jobs:
  golangci:
    runs-on: ubuntu-latest

    env:
      # AAASM-4709: pin this job onto the go1.26.5 toolchain, the same one
      # govulncheck.yml/release.yml's security-gate already force (see the
      # AAASM-4634 comment there). Without this, `go` resolves to whatever
      # actions/setup-go's `go-version: "1.26.x"` cached (the 1.26.4 toolcache)
      # and `go mod download`/golangci-lint's own `go build` run outbound TLS
      # on a stdlib still vulnerable to GO-2026-5856.
      GOTOOLCHAIN: go1.26.5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.x"

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v2.11.4
          args: --timeout=3m

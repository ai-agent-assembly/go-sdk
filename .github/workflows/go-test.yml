name: Go Test Matrix

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        go-version: ["1.26.x"]
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest","macos-latest"]') }}
        cgo-enabled: ["0", "1"]

    env:
      CGO_ENABLED: ${{ matrix.cgo-enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Run tests
        run: go test ./...

      - name: Run context benchmark
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26.x' && matrix.cgo-enabled == '0'
        run: go test ./assembly -run='^$' -bench='BenchmarkAgentIDFromContext' -benchtime=100ms

  vet:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Run go vet
        run: go vet ./...

  integration-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Run integration tests
        run: go test -tags integration ./assembly/... -v

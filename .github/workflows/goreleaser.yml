name: Goreleaser

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.0.1-beta.3); used for manual/backfill runs"
        required: true
        type: string

# AAASM-4022: default all jobs to least privilege. goreleaser-release overrides
# this with `contents: write` for the release upload; goreleaser-check inherits
# read-only here.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # AAASM-4709: pin every job in this workflow onto the go1.26.5 toolchain, the
  # same one govulncheck.yml/release.yml's security-gate already force (see the
  # AAASM-4634 comment there). Without this, `go` resolves to whatever
  # actions/setup-go's `go-version: "1.26.x"` cached (the 1.26.4 toolcache) and
  # the goreleaser-action's `go build` runs outbound TLS on a stdlib still
  # vulnerable to GO-2026-5856.
  GOTOOLCHAIN: go1.26.5

jobs:
  # Config validation on PRs and master pushes — keeps the existing fast feedback path.
  goreleaser-check:
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.x"

      - name: Goreleaser check
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # AAASM-4022: pin the goreleaser CLI (was floating `latest`) so the
          # release tooling is reproducible; bump deliberately. v2.16.0 == the
          # `latest` at pin time, so no behaviour change. (goreleaser-action's
          # `version` takes a semver/constraint, not a git SHA.)
          version: "v2.16.0"
          args: check

  # Publish a GitHub Release on a pushed v* tag, or on a manual/backfill dispatch.
  goreleaser-release:
    if: (github.event_name == 'push' && github.ref_type == 'tag') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags so goreleaser can build the changelog from git.
          fetch-depth: 0
          submodules: recursive
          # On a manual/backfill dispatch, check out the requested tag.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.x"

      - name: Goreleaser release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # AAASM-4022: pinned (was floating `latest`) — keep in lockstep with
          # the goreleaser-check job's pin above; bump deliberately.
          version: "v2.16.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Govulncheck

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
    branches:
      - master
  schedule:
    - cron: "0 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  govulncheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/govulncheck.txt
          RC=${PIPESTATUS[0]}
          if [ "$RC" -eq 3 ]; then
            # Extract IDs of vulnerabilities that directly affect our code
            ALL_IDS=$(grep -E "^Vulnerability #[0-9]+: GO-" /tmp/govulncheck.txt | grep -oE "GO-[0-9]+-[0-9]+")
            # CVEs with no fix in any released Go toolchain version
            KNOWN_UNFIXED="GO-2026-4971"
            UNKNOWN=$(echo "$ALL_IDS" | grep -vxF "$KNOWN_UNFIXED" | tr -d '[:space:]')
            if [ -z "$UNKNOWN" ]; then
              echo "::warning::Known unfixed CVE(s) with no released fix: $ALL_IDS — awaiting go1.26.3. Treating as accepted risk."
              exit 0
            fi
          fi
          exit $RC

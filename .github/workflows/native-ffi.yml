name: Native FFI Build

# Builds the vendored native/aa-ffi-go shim (a thin C-ABI over the SHA-pinned
# aa-sdk-client) and exercises the real cgo binding (-tags aa_ffi_go). The
# default Go test matrix never sets this tag, so this is the only lane that
# compiles + links the native path (AAASM-2704).

on:
  pull_request:
    paths:
      - "native/**"
      - "internal/ffi/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/native-ffi.yml"
  push:
    branches:
      - master
    paths:
      - "native/**"
      - "internal/ffi/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/native-ffi.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-cgo:
    name: Build native shim + cgo tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Build native/aa-ffi-go + run cgo-tagged tests
        run: make test-native

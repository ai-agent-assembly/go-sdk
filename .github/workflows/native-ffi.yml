name: Native FFI Build

# Builds the vendored native/aa-ffi-go shim (a thin C-ABI over the SHA-pinned
# aa-sdk-client) and exercises the real cgo binding (-tags aa_ffi_go). The
# default Go test matrix never sets this tag, so this is the only lane that
# compiles + links the native path (AAASM-2704).

on:
  pull_request:
    paths:
      - "native/**"
      - "internal/ffi/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/native-ffi.yml"
  push:
    branches:
      - main
    paths:
      - "native/**"
      - "internal/ffi/**"
      - "Makefile"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/native-ffi.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-cgo:
    name: Build native shim + cgo tests
    runs-on: ubuntu-latest
    env:
      # AAASM-4709: pin this job onto the go1.26.5 toolchain, the same one
      # govulncheck.yml/release.yml's security-gate already force (see the
      # AAASM-4634 comment there). Without this, `go` resolves to whatever
      # actions/setup-go's `go-version: "1.26.x"` cached (the 1.26.4 toolcache)
      # and `make test-native`'s `go build`/`go test` run outbound TLS on a
      # stdlib still vulnerable to GO-2026-5856.
      GOTOOLCHAIN: go1.26.5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.x"

      - name: Build native/aa-ffi-go + run cgo-tagged tests
        run: make test-native

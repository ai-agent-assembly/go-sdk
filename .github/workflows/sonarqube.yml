name: SonarQube

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || 'AI-agent-assembly_go-sdk' }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || 'ai-agent-assembly' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"

      - name: Verify modules
        run: |
          go mod download
          go mod verify
          git diff --exit-code go.mod go.sum

      - name: Run tests with coverage
        run: go test ./... -covermode=atomic -coverprofile=coverage.out

      - name: Build Sonar scanner arguments
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        run: |
          scanner_args="-Dsonar.projectKey=${SONAR_PROJECT_KEY} -Dsonar.go.coverage.reportPaths=coverage.out -Dsonar.test.inclusions=**/*_test.go -Dsonar.coverage.exclusions=examples/**"
          if [ -n "${SONAR_ORGANIZATION}" ]; then
            scanner_args="${scanner_args} -Dsonar.organization=${SONAR_ORGANIZATION}"
          fi
          echo "SONAR_SCANNER_ARGS=${scanner_args}" >> "${GITHUB_ENV}"

      - name: Run SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: ${{ env.SONAR_SCANNER_ARGS }}

      - name: Check SonarQube quality gate
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' && env.SONAR_PROJECT_KEY != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt
          pollingTimeoutSec: 300

      - name: Skip SonarQube scan when config is missing
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' || env.SONAR_PROJECT_KEY == '' }}
        run: echo "Skipping SonarQube scan. Configure SONAR_TOKEN secret and SONAR_HOST_URL / SONAR_PROJECT_KEY repository variables."
